{% extends "base.html" %}

{% block content %}
<style>
    .page-header, .controls, .results, .explanation-panel {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        border-radius: 1rem;
        padding: 1.5rem;
        margin-bottom: 2rem;
    }

    .explanation-panel {
        background: rgba(0, 0, 0, 0.5);
        color: white;
    }

    .explanation-panel h3 {
        color: #fdcb6e;
        margin-bottom: 1rem;
    }

    .explanation-panel pre {
        background: rgba(0,0,0,0.3);
        padding: 1rem;
        border-radius: 0.5rem;
        overflow-x: auto;
        font-family: 'Courier New', monospace;
        font-size: 0.9rem;
        white-space: pre-wrap;
    }

    .recommendations {
        background: rgba(0,0,0,0.3);
        padding: 1rem;
        border-radius: 0.5rem;
        margin-top: 1rem;
    }
</style>

<div class="page-header">
    <h2>🎮 GPU Simulation - HPC Accelerator</h2>
</div>

<div class="controls">
    <div class="control-group">
        <h4>GPU Specifications</h4>
        <label>Memory Size: <span id="memorySizeValue">24</span> GB</label>
        <input type="range" id="memorySize" min="4" max="80" value="24" step="1">
        
        <label>Compute Units: <span id="computeUnitsValue">80</span></label>
        <input type="range" id="computeUnits" min="8" max="256" value="80" step="1">
        
        <label>Bandwidth: <span id="bandwidthValue">800</span> GB/s</label>
        <input type="range" id="bandwidth" min="100" max="2000" value="800" step="10">
        
        <label>Compute Power: <span id="computePowerValue">40</span> TFLOPS</label>
        <input type="range" id="computePower" min="5" max="200" value="40" step="1">
    </div>
    
    <div class="control-group">
        <h4>Workload</h4>
        <label>Data Size: <span id="dataSizeValue">10</span> GB</label>
        <input type="range" id="dataSize" min="0.1" max="50" value="10" step="0.1">
        
        <label>Operations: <span id="operationsValue">100</span> TFLOP</label>
        <input type="range" id="operations" min="1" max="500" value="100" step="1">
    </div>
</div>

<div id="results" class="results">
    <h3>Performance Estimates</h3>
    <div id="resultContent">Loading...</div>
</div>

<div id="explanationPanel" class="explanation-panel"></div>

<script>
    async function apiCall(endpoint, method='POST', data=null) {
        const options = {
            method: method,
            headers: {'Content-Type': 'application/json'}
        };
        if (data) {
            options.body = JSON.stringify(data);
        }
        const response = await fetch(endpoint, options);
        return await response.json();
    }
    
    async function calculate() {
        const memorySize = parseFloat(document.getElementById('memorySize').value);
        const computeUnits = parseInt(document.getElementById('computeUnits').value);
        const bandwidth = parseFloat(document.getElementById('bandwidth').value);
        const computePower = parseFloat(document.getElementById('computePower').value);
        const dataSize = parseFloat(document.getElementById('dataSize').value);
        const operations = parseFloat(document.getElementById('operations').value);
        
        const result = await apiCall('/api/gpu/calculate', 'POST', {
            memory_size: memorySize,
            compute_units: computeUnits,
            bandwidth: bandwidth,
            compute_power: computePower,
            data_size: dataSize,
            operations: operations
        });
        
        const boundClass = result.bound_type === 'Balanced' ? 'bound-balanced' : 'bound-memory';
        
        document.getElementById('resultContent').innerHTML = `
            <div class="result-item">💾 Memory Transfer: ${result.memory_time} s</div>
            <div class="result-item">⚙️ Kernel Execution: ${result.compute_time} s</div>
            <div class="result-item">⏱️ Total Time: ${result.total_time} s</div>
            <div class="result-item">🚀 CPU Speedup: ${result.speedup_cpu}x</div>
            <div class="result-item">📊 Memory Utilization: ${result.memory_utilization}%</div>
            <div class="result-item">🔄 Bandwidth Utilization: ${result.bandwidth_utilization}%</div>
            <div class="result-item">⚡ Achieved Performance: ${result.achieved_performance} TFLOPS</div>
            <div class="result-item ${boundClass}">⚠️ Workload Type: ${result.bound_type}</div>
        `;
        
        // Display detailed explanation
        if (result.explanation) {
            const exp = result.explanation;
            let recommendationsHtml = '';
            if (exp.recommendations) {
                recommendationsHtml = '<div class="recommendations"><strong>💡 Optimization Recommendations:</strong><br>';
                exp.recommendations.forEach(rec => {
                    recommendationsHtml += `• ${rec}<br>`;
                });
                recommendationsHtml += '</div>';
            }
            
            document.getElementById('explanationPanel').innerHTML = `
                <h3>📖 ${exp.title}</h3>
                <pre>${exp.memory_calculation}</pre>
                <pre>${exp.compute_calculation}</pre>
                <pre>${exp.total_calculation}</pre>
                <pre>${exp.occupancy_formula}</pre>
                <p><strong>🔍 Bottleneck Analysis:</strong> ${exp.bottleneck_analysis}</p>
                ${recommendationsHtml}
            `;
        }
    }
    
    document.getElementById('memorySize').oninput = (e) => {
        document.getElementById('memorySizeValue').innerText = e.target.value;
        calculate();
    };
    document.getElementById('computeUnits').oninput = (e) => {
        document.getElementById('computeUnitsValue').innerText = e.target.value;
        calculate();
    };
    document.getElementById('bandwidth').oninput = (e) => {
        document.getElementById('bandwidthValue').innerText = e.target.value;
        calculate();
    };
    document.getElementById('computePower').oninput = (e) => {
        document.getElementById('computePowerValue').innerText = e.target.value;
        calculate();
    };
    document.getElementById('dataSize').oninput = (e) => {
        document.getElementById('dataSizeValue').innerText = e.target.value;
        calculate();
    };
    document.getElementById('operations').oninput = (e) => {
        document.getElementById('operationsValue').innerText = e.target.value;
        calculate();
    };
    
    calculate();
</script>
{% endblock %}
