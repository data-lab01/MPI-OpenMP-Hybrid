{% extends "base.html" %}

{% block content %}
<style>
    .algorithms-header {
        margin-bottom: 2rem;
        text-align: center;
    }
    .algorithms-header h1 {
        font-size: 2.5rem;
        margin-bottom: 0.5rem;
    }
    /* Results Window Panel */
    .results-window {
        position: fixed;
        right: 0;
        top: 80px;
        width: 380px;
        background: rgba(17, 24, 39, 0.95);
        backdrop-filter: blur(20px);
        border-left: 3px solid var(--primary-500);
        border-radius: var(--radius-xl) 0 0 var(--radius-xl);
        box-shadow: var(--shadow-2xl);
        z-index: 1000;
        transition: transform 0.3s ease;
        max-height: calc(100vh - 100px);
        overflow-y: auto;
    }
    
    .results-window.collapsed {
        transform: translateX(calc(100% - 40px));
    }
    
    .results-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 1rem;
        background: var(--primary-600);
        border-radius: var(--radius-xl) 0 0 0;
        cursor: pointer;
    }
    
    .results-title {
        font-weight: 600;
        color: white;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .results-toggle {
        background: none;
        border: none;
        color: white;
        cursor: pointer;
        font-size: 1.2rem;
    }
    
    .results-content {
        padding: 1rem;
    }
    
    .result-card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: var(--radius-lg);
        padding: 0.75rem;
        margin-bottom: 0.75rem;
        border-left: 3px solid var(--primary-400);
        animation: slideInRight 0.3s ease;
    }
    
    .result-card-title {
        font-size: 0.8rem;
        color: var(--primary-300);
        margin-bottom: 0.25rem;
        font-weight: 600;
    }
    
    .result-card-value {
        font-size: 1rem;
        font-weight: bold;
        color: white;
    }
    
    .result-card-detail {
        font-size: 0.7rem;
        color: var(--gray-400);
        margin-top: 0.25rem;
    }
    
    .clear-results {
        background: var(--gray-700);
        border: none;
        color: white;
        padding: 0.5rem;
        border-radius: var(--radius-md);
        width: 100%;
        cursor: pointer;
        margin-top: 0.5rem;
        font-size: 0.75rem;
    }
    
    .clear-results:hover {
        background: var(--gray-600);
    }
    
    @keyframes slideInRight {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
    }
    
    .category-section {
        margin-bottom: 2rem;
    }
    
    .category-title {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid var(--primary-500);
        display: inline-block;
        cursor: pointer;
    }
    
    .algorithm-card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: var(--radius-xl);
        padding: 1.25rem;
        margin-bottom: 1rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition: all 0.3s;
    }
    
    .algorithm-card:hover {
        background: rgba(255, 255, 255, 0.08);
        transform: translateX(5px);
        border-color: var(--primary-500);
    }
    
    .algorithm-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
        gap: 0.5rem;
    }
    
    .algorithm-name {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--primary-300);
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }
    
    .algorithm-name .help-icon-small {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--primary-600);
        color: white;
        font-size: 11px;
        cursor: pointer;
    }
    
    .algorithm-year {
        font-size: 0.75rem;
        color: var(--gray-500);
        background: rgba(0,0,0,0.3);
        padding: 0.2rem 0.5rem;
        border-radius: var(--radius-sm);
    }
    
    .algorithm-formula {
        font-family: monospace;
        font-size: 0.9rem;
        background: rgba(0,0,0,0.3);
        padding: 0.5rem;
        border-radius: var(--radius-md);
        margin: 0.5rem 0;
    }
    
    .algorithm-description {
        font-size: 0.875rem;
        color: var(--gray-300);
        margin-bottom: 0.75rem;
    }
    
    .algorithm-tags {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
    }
    
    .tag {
        background: rgba(99, 102, 241, 0.2);
        color: var(--primary-300);
        padding: 0.2rem 0.6rem;
        border-radius: var(--radius-full);
        font-size: 0.7rem;
    }
    
    .simulate-btn {
        margin-top: 0.75rem;
        padding: 0.4rem 0.8rem;
        font-size: 0.75rem;
        background: var(--primary-600);
        border: none;
        border-radius: var(--radius-md);
        color: white;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .simulate-btn:hover {
        background: var(--primary-500);
        transform: translateY(-1px);
    }
    
    .simulation-panel {
        background: rgba(0, 0, 0, 0.4);
        border-radius: var(--radius-lg);
        padding: 1rem;
        margin-top: 1rem;
        display: none;
    }
    
    .simulation-panel.active {
        display: block;
        animation: slideDown 0.3s ease;
    }
    
    @keyframes slideDown {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .grid-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
    }
    
    .result-highlight {
        font-size: 1.2rem;
        font-weight: bold;
        color: var(--primary-300);
        text-align: center;
        padding: 0.75rem;
        background: rgba(0,0,0,0.3);
        border-radius: var(--radius-lg);
        margin-top: 0.75rem;
    }
    
    .param-group {
        margin-bottom: 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        flex-wrap: wrap;
    }
    
    .param-group label {
        min-width: 140px;
        font-size: 0.8rem;
    }
    
    .param-group input, .param-group select {
        flex: 1;
        min-width: 120px;
        padding: 0.3rem 0.5rem;
        border-radius: var(--radius-md);
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(0,0,0,0.3);
        color: white;
    }
    
    .search-bar {
        background: rgba(255, 255, 255, 0.05);
        border-radius: var(--radius-xl);
        padding: 1.5rem;
        margin-bottom: 2rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .complexity {
        font-family: monospace;
        color: var(--success);
        font-size: 0.75rem;
        margin-top: 0.5rem;
    }
    
    /* Make room for results window */
    .container {
        margin-right: 400px;
    }
    
    @media (max-width: 1024px) {
        .results-window { width: 320px; }
        .container { margin-right: 340px; }
    }
    
    @media (max-width: 768px) {
        .results-window { display: none; }
        .container { margin-right: 0; }
        .grid-2 { grid-template-columns: 1fr; }
        .param-group { flex-direction: column; align-items: flex-start; }
        .param-group label { min-width: auto; }
    }
</style>

<div class="algorithms-header">
    <h1>📐 HPC Algorithms & Laws Reference</h1>
    <p style="color: var(--gray-400);">Interactive simulations of all parallel computing laws, scheduling algorithms, and performance metrics</p>
</div>

<!-- Results Window -->
<div class="results-window" id="resultsWindow">
    <div class="results-header" onclick="toggleResultsWindow()">
        <div class="results-title">
            📊 Simulation Results
            <span id="resultsCount" style="background: rgba(255,255,255,0.2); padding: 0.1rem 0.4rem; border-radius: 10px; font-size: 0.7rem;">0</span>
        </div>
        <button class="results-toggle" id="toggleResultsBtn">◀</button>
    </div>
    <div class="results-content" id="resultsContent">
        <div style="text-align: center; color: var(--gray-500); padding: 2rem;">
            Click "Simulate" on any algorithm<br>Results will appear here
        </div>
    </div>
    <button class="clear-results" onclick="clearAllResults()">Clear All Results</button>
</div>

<!-- Search and Filter -->
<div class="search-bar">
    <div style="display: flex; gap: 1rem; flex-wrap: wrap;">
        <input type="text" id="searchInput" placeholder="🔍 Search algorithms..." class="form-input" style="flex: 2;">
        <select id="categoryFilter" class="form-select" style="width: auto;">
            <option value="all">All Categories</option>
            <option value="scaling">📐 Scaling Laws</option>
            <option value="scheduling">🔄 Scheduling Algorithms</option>
            <option value="network">🌐 Network Algorithms</option>
            <option value="communication">📡 Communication Algorithms</option>
            <option value="numerical">🧮 Numerical Algorithms</option>
            <option value="energy">⚡ Energy Laws</option>
            <option value="performance">📊 Performance Metrics</option>
        </select>
        <button onclick="resetFilters()" class="btn btn-outline">Reset</button>
    </div>
</div>

<div id="algorithmsContainer"></div>

<script>
    let simulationResults = [];
    let resultsWindowCollapsed = false;
    
    // Complete algorithms database with CORRECT simulation functions
    const algorithms = {
        scaling: [
            { name: "Amdahl's Law", year: 1967, formula: "Speedup = 1 / (S + (1-S)/N)", description: "The serial portion of code limits maximum speedup.", tags: ["Speedup Limit", "Theoretical Bound"], complexity: "O(1)",
              simulate: function(S, N) { return 1 / (S + (1 - S) / N); },
              params: [{ name: "Serial Fraction (S)", id: "amdahl_s", min: 0, max: 0.5, step: 0.01, default: 0.1, suffix: "%", multiplier: 100 },
                       { name: "Number of Cores (N)", id: "amdahl_n", min: 1, max: 1024, step: 1, default: 32, suffix: "" }] },
            { name: "Gustafson's Law", year: 1988, formula: "Speedup = N - S×(N-1)", description: "Problem size scales with cores.", tags: ["Weak Scaling", "Scaled Speedup"], complexity: "O(1)",
              simulate: function(S, N) { return N - S * (N - 1); },
              params: [{ name: "Serial Fraction (S)", id: "gustafson_s", min: 0, max: 0.5, step: 0.01, default: 0.05, suffix: "%", multiplier: 100 },
                       { name: "Number of Cores (N)", id: "gustafson_n", min: 1, max: 1024, step: 1, default: 64, suffix: "" }] },
            { name: "Karp-Flatt Metric", year: 1990, formula: "e = (1/Speedup - 1/N) / (1 - 1/N)", description: "Measures actual serial fraction including overhead.", tags: ["Serial Fraction", "Overhead"], complexity: "O(1)",
              simulate: function(speedup, N) { return (1/speedup - 1/N) / (1 - 1/N); },
              params: [{ name: "Measured Speedup", id: "karp_speedup", min: 1, max: 1000, step: 1, default: 15, suffix: "x" },
                       { name: "Number of Cores (N)", id: "karp_n", min: 1, max: 1024, step: 1, default: 32, suffix: "" }] },
            { name: "Little's Law", year: 1961, formula: "L = λ × W", description: "Relates queue length to arrival rate and waiting time.", tags: ["Queueing Theory", "Scheduling"], complexity: "O(1)",
              simulate: function(lambda, W) { return lambda * W; },
              params: [{ name: "Arrival Rate (λ)", id: "little_lambda", min: 1, max: 100, step: 1, default: 10, suffix: "jobs/hour" },
                       { name: "Avg Wait Time (W)", id: "little_w", min: 0.1, max: 10, step: 0.1, default: 0.5, suffix: "hours" }] }
        ],
        scheduling: [
            { name: "FIFO (FCFS)", year: "1960s", formula: "First-In-First-Out", description: "Jobs execute in arrival order.", tags: ["Batch Systems", "Fair"], complexity: "O(1)",
              simulate: function(jobCount, longFirst) { let waiting = [], time = 0; for (let i = 0; i < jobCount; i++) { waiting.push(time); time += (longFirst && i === 0) ? 100 : 20; } return { avgWait: waiting.reduce((a,b)=>a+b,0)/jobCount, maxWait: Math.max(...waiting) }; },
              params: [{ name: "Number of Jobs", id: "fifo_jobs", min: 1, max: 20, step: 1, default: 10, suffix: "jobs" },
                       { name: "Long Job First", id: "fifo_long", type: "select", options: ["No", "Yes"], default: "No" }] },
            { name: "Shortest Job First", year: "1960s", formula: "Minimize average waiting time", description: "Optimal for minimizing average wait time.", tags: ["Optimal", "Starvation Risk"], complexity: "O(n log n)",
              simulate: function(jobCount) { let durations = Array.from({length: jobCount}, () => Math.floor(Math.random() * 90) + 10); let sorted = [...durations].sort((a,b)=>a-b); let time = 0, waits = []; for (let d of sorted) { waits.push(time); time += d; } let fifoWait = durations.reduce((a,b,i)=>a + durations.slice(0,i).reduce((s,x)=>s+x,0),0)/jobCount; let sjfWait = waits.reduce((a,b)=>a+b,0)/jobCount; return { avgWait: sjfWait, improvement: ((fifoWait - sjfWait)/fifoWait*100).toFixed(1) }; },
              params: [{ name: "Number of Jobs", id: "sjf_jobs", min: 3, max: 20, step: 1, default: 10, suffix: "jobs" }] },
            { name: "Priority Scheduling", year: "1970s", formula: "Higher priority first", description: "Jobs with higher priority execute first.", tags: ["Dynamic Priority", "Aging"], complexity: "O(n log n)",
              simulate: function(jobCount, useAging) { let jobs = Array.from({length: jobCount}, (_,i) => ({id: i, priority: Math.floor(Math.random()*10)+1, duration: Math.floor(Math.random()*50)+10})); let time = 0, waits = []; while (jobs.length > 0) { if (useAging === 'Yes') jobs.forEach(j => j.priority++); jobs.sort((a,b) => b.priority - a.priority); let job = jobs.shift(); waits.push(time); time += job.duration; } return { avgWait: waits.reduce((a,b)=>a+b,0)/jobCount, maxWait: Math.max(...waits) }; },
              params: [{ name: "Number of Jobs", id: "prio_jobs", min: 3, max: 20, step: 1, default: 10, suffix: "jobs" },
                       { name: "Use Aging", id: "prio_aging", type: "select", options: ["No", "Yes"], default: "Yes" }] },
            { name: "Round Robin", year: "1970s", formula: "Time Quantum = q", description: "Each job gets a fixed time slice.", tags: ["Time Sharing", "Fair"], complexity: "O(n)",
              simulate: function(jobCount, quantum) { let jobs = Array.from({length: jobCount}, (_,i) => ({id: i, remaining: Math.floor(Math.random()*100)+20})); let time = 0, queue = [...jobs], completions = []; while (queue.length > 0) { let job = queue.shift(); if (job.remaining <= quantum) { time += job.remaining; completions.push(time); } else { time += quantum; job.remaining -= quantum; queue.push(job); } } return { avgCompletion: completions.reduce((a,b)=>a+b,0)/jobCount }; },
              params: [{ name: "Number of Jobs", id: "rr_jobs", min: 2, max: 15, step: 1, default: 8, suffix: "jobs" },
                       { name: "Time Quantum", id: "rr_quantum", min: 10, max: 100, step: 5, default: 30, suffix: "ms" }] },
            { name: "Multilevel Feedback Queue", year: "1970s", formula: "Multiple priority queues", description: "Jobs move between queues based on behavior.", tags: ["Adaptive", "MLFQ"], complexity: "O(n log n)",
              simulate: function(jobCount) { let jobs = Array.from({length: jobCount}, (_,i) => ({id: i, remaining: Math.floor(Math.random()*150)+30})); let time = 0; let queues = [[], [], []]; let quantums = [10, 20, 40]; for (let job of jobs) queues[0].push(job); while (queues[0].length > 0 || queues[1].length > 0 || queues[2].length > 0) { for (let q = 0; q < 3; q++) { if (queues[q].length > 0) { let job = queues[q].shift(); let exec = Math.min(job.remaining, quantums[q]); time += exec; job.remaining -= exec; if (job.remaining > 0) { let nextQ = Math.min(q + 1, 2); queues[nextQ].push(job); } break; } } } return { avgCompletion: jobs.reduce((a,b)=>a+time,0)/jobCount }; },
              params: [{ name: "Number of Jobs", id: "mlfq_jobs", min: 3, max: 20, step: 1, default: 10, suffix: "jobs" }] }
        ],
        network: [
            { name: "Dragonfly Routing", year: 2008, formula: "3-hop routing", description: "source → local → global → destination.", tags: ["Cray", "3 Hops"], complexity: "Diameter: 3",
              simulate: function(nodes, packets) { return { hops: 3, totalHops: packets * 3, latencyMs: packets * 3 * 0.5 }; },
              params: [{ name: "Number of Nodes", id: "drag_nodes", min: 10, max: 1000, step: 10, default: 100, suffix: "nodes" },
                       { name: "Packets", id: "drag_packets", min: 1, max: 1000, step: 10, default: 100, suffix: "packets" }] },
            { name: "Fat-Tree Routing", year: 1985, formula: "Full bisection bandwidth", description: "No bandwidth bottlenecks.", tags: ["Full Bisection", "Clos"], complexity: "Diameter: O(log N)",
              simulate: function(nodes, packets) { let hops = Math.ceil(Math.log2(nodes) * 2); return { hops: hops, totalHops: packets * hops, latencyMs: packets * hops * 0.3 }; },
              params: [{ name: "Number of Nodes", id: "fat_nodes", min: 4, max: 1024, step: 4, default: 64, suffix: "nodes" },
                       { name: "Packets", id: "fat_packets", min: 1, max: 1000, step: 10, default: 100, suffix: "packets" }] },
            { name: "Torus Routing", year: "1970s", formula: "Dimension-order routing", description: "Route sequentially through dimensions.", tags: ["Torus", "Deadlock-Free"], complexity: "Diameter: D",
              simulate: function(dimensions, packets) { let dims = dimensions.split('x').map(Number); let hops = dims.reduce((a,b) => a + Math.floor(b/2), 0); return { hops: hops, totalHops: packets * hops, latencyMs: packets * hops * 0.4 }; },
              params: [{ name: "Dimensions", id: "torus_dims", type: "text", default: "8x8x8" },
                       { name: "Packets", id: "torus_packets", min: 1, max: 1000, step: 10, default: 100, suffix: "packets" }] }
        ],
        communication: [
            { name: "MPI_Bcast", year: "1980s", formula: "Tree-based", description: "Broadcasts from root to all.", tags: ["Broadcast", "MPI"], complexity: "O(log P)",
              simulate: function(ranks, msgSize) { let steps = Math.ceil(Math.log2(ranks)); return { steps: steps, timeUs: steps * (5 + msgSize / 100) }; },
              params: [{ name: "Ranks", id: "bcast_ranks", min: 2, max: 1024, step: 2, default: 64, suffix: "ranks" },
                       { name: "Message Size (KB)", id: "bcast_msg", min: 1, max: 10000, step: 100, default: 1000, suffix: "KB" }] },
            { name: "MPI_Allreduce", year: "1980s", formula: "Recursive Doubling", description: "Combines values from all processes.", tags: ["Allreduce", "MPI"], complexity: "O(log P)",
              simulate: function(ranks, msgSize) { let steps = Math.ceil(Math.log2(ranks)); return { steps: steps, timeUs: steps * (10 + msgSize / 50) }; },
              params: [{ name: "Ranks", id: "allred_ranks", min: 2, max: 1024, step: 2, default: 64, suffix: "ranks" },
                       { name: "Message Size (KB)", id: "allred_msg", min: 1, max: 10000, step: 100, default: 1000, suffix: "KB" }] },
            { name: "MPI_Alltoall", year: 1997, formula: "Bruck", description: "Every process sends to every other.", tags: ["Alltoall", "MPI"], complexity: "O(log P)",
              simulate: function(ranks, msgSize) { let steps = Math.ceil(Math.log2(ranks)); return { steps: steps, timeUs: steps * (8 + msgSize / 25) }; },
              params: [{ name: "Ranks", id: "alltoall_ranks", min: 2, max: 1024, step: 2, default: 64, suffix: "ranks" },
                       { name: "Message Size (KB)", id: "alltoall_msg", min: 1, max: 10000, step: 100, default: 1000, suffix: "KB" }] }
        ],
        numerical: [
            { name: "Domain Decomposition", year: "1980s", formula: "Divide domain", description: "Split domain among processors.", tags: ["CFD", "FEM"], complexity: "O(P)",
              simulate: function(processors, gridSize) { return { cellsPerProc: (gridSize * gridSize) / processors, commTimeUs: processors * 100 }; },
              params: [{ name: "Processors", id: "dom_proc", min: 1, max: 256, step: 1, default: 16, suffix: "procs" },
                       { name: "Grid Size", id: "dom_grid", min: 100, max: 10000, step: 100, default: 1000, suffix: "cells" }] },
            { name: "Fast Fourier Transform", year: 1965, formula: "O(N log N)", description: "Efficient frequency analysis.", tags: ["Spectral"], complexity: "O(N log N)",
              simulate: function(N) { let dft = N * N; let fft = N * Math.log2(N); return { dftOps: dft, fftOps: Math.round(fft), speedup: (dft/fft).toFixed(0) }; },
              params: [{ name: "N (points)", id: "fft_n", min: 64, max: 65536, step: 64, default: 1024, suffix: "points" }] },
            { name: "Conjugate Gradient", year: 1952, formula: "Iterative solver", description: "Solves linear systems.", tags: ["Linear Algebra"], complexity: "O(N²)",
              simulate: function(N, iter) { return { operations: (N * N * iter).toExponential(2), memoryMB: (N * N * 8 / 1e6).toFixed(2) }; },
              params: [{ name: "Matrix Size", id: "cg_n", min: 100, max: 10000, step: 100, default: 1000 },
                       { name: "Iterations", id: "cg_iter", min: 10, max: 1000, step: 10, default: 100, suffix: "iter" }] }
        ],
        energy: [
            { name: "Power Usage Effectiveness", year: 2007, formula: "PUE = Total / IT", description: "Data center efficiency. EuroHPC target < 1.2.", tags: ["Green HPC"], complexity: "O(1)",
              simulate: function(total, it) { return total / it; },
              params: [{ name: "Total Power (kW)", id: "pue_total", min: 100, max: 10000, step: 10, default: 1200 },
                       { name: "IT Power (kW)", id: "pue_it", min: 100, max: 9000, step: 10, default: 1000 }] },
            { name: "Carbon Footprint", year: "2000s", formula: "CO₂ = Power × Hours × Intensity", description: "Environmental impact.", tags: ["Environmental"], complexity: "O(1)",
              simulate: function(power, hours, intensity) { return (power * hours * intensity) / 1000; },
              params: [{ name: "Power (kW)", id: "carbon_power", min: 100, max: 50000, step: 100, default: 1000 },
                       { name: "Hours/Year", id: "carbon_hours", min: 1000, max: 8760, step: 100, default: 8760 },
                       { name: "Carbon Intensity", id: "carbon_intensity", min: 10, max: 500, step: 5, default: 50, suffix: "gCO₂/kWh" }] }
        ],
        performance: [
            { name: "Parallel Efficiency", year: "1980s", formula: "Efficiency = Speedup / N", description: "Measures core utilization.", tags: ["Utilization"], complexity: "O(1)",
              simulate: function(speedup, N) { return (speedup / N) * 100; },
              params: [{ name: "Speedup", id: "eff_speedup", min: 1, max: 1000, step: 1, default: 15, suffix: "x" },
                       { name: "Cores", id: "eff_cores", min: 1, max: 1024, step: 1, default: 32 }] },
            { name: "Strong Scaling", year: "1980s", formula: "Fixed problem size", description: "Time reduction with more cores.", tags: ["Amdahl"], complexity: "O(1)",
              simulate: function(cores, serial) { let s = 1 / (serial + (1-serial)/cores); return { speedup: s.toFixed(2), efficiency: (s/cores*100).toFixed(1) }; },
              params: [{ name: "Cores", id: "strong_cores", min: 1, max: 1024, step: 1, default: 64 },
                       { name: "Serial Fraction", id: "strong_serial", min: 0, max: 0.5, step: 0.01, default: 0.05, suffix: "%", multiplier: 100 }] },
            { name: "Weak Scaling", year: "1980s", formula: "Problem size ∝ cores", description: "Problem grows with cores.", tags: ["Gustafson"], complexity: "O(1)",
              simulate: function(cores, serial) { let s = cores - serial * (cores - 1); return { speedup: s.toFixed(2), efficiency: (s/cores*100).toFixed(1) }; },
              params: [{ name: "Cores", id: "weak_cores", min: 1, max: 1024, step: 1, default: 64 },
                       { name: "Serial Fraction", id: "weak_serial", min: 0, max: 0.5, step: 0.01, default: 0.05, suffix: "%", multiplier: 100 }] }
        ]
    };

    function addResult(algorithmName, resultText, details) {
        const resultsContent = document.getElementById('resultsContent');
        const resultCard = document.createElement('div');
        resultCard.className = 'result-card';
        resultCard.innerHTML = `<div class="result-card-title">${algorithmName}</div><div class="result-card-value">${resultText}</div>${details ? `<div class="result-card-detail">${details}</div>` : ''}`;
        if (resultsContent.children.length === 1 && resultsContent.children[0].innerText?.includes('Click')) resultsContent.innerHTML = '';
        resultsContent.insertBefore(resultCard, resultsContent.firstChild);
        document.getElementById('resultsCount').innerText = document.querySelectorAll('.result-card').length;
        while (document.querySelectorAll('.result-card').length > 20) document.querySelectorAll('.result-card')[document.querySelectorAll('.result-card').length - 1]?.remove();
    }
    
    function clearAllResults() {
        document.getElementById('resultsContent').innerHTML = '<div style="text-align: center; color: var(--gray-500); padding: 2rem;">Click "Simulate" on any algorithm<br>Results will appear here</div>';
        document.getElementById('resultsCount').innerText = '0';
    }
    
    function toggleResultsWindow() {
        const w = document.getElementById('resultsWindow');
        const btn = document.getElementById('toggleResultsBtn');
        if (w.classList.contains('collapsed')) { w.classList.remove('collapsed'); btn.innerHTML = '◀'; }
        else { w.classList.add('collapsed'); btn.innerHTML = '▶'; }
    }
    
    function renderAlgorithms() {
        const container = document.getElementById('algorithmsContainer');
        container.innerHTML = '';
        for (const [category, algos] of Object.entries(algorithms)) {
            const categoryDiv = document.createElement('div'); categoryDiv.className = 'category-section'; categoryDiv.dataset.category = category;
            const title = document.createElement('h2'); title.className = 'category-title'; title.innerHTML = getCategoryIcon(category) + ' ' + getCategoryName(category);
            categoryDiv.appendChild(title);
            const grid = document.createElement('div'); grid.className = 'grid-2';
            algos.forEach((algo, idx) => { grid.appendChild(createAlgorithmCard(algo, category, idx)); });
            categoryDiv.appendChild(grid); container.appendChild(categoryDiv);
        }
        attachAllSimulationListeners();
    }
    
    function getCategoryIcon(c) { return { scaling:'📐', scheduling:'🔄', network:'🌐', communication:'📡', numerical:'🧮', energy:'⚡', performance:'📊' }[c] || '📚'; }
    function getCategoryName(c) { return { scaling:'Scaling Laws', scheduling:'Scheduling', network:'Network', communication:'Communication', numerical:'Numerical', energy:'Energy', performance:'Performance' }[c] || c; }
    
    function createAlgorithmCard(algo, category, idx) {
        const card = document.createElement('div'); card.className = 'algorithm-card'; card.dataset.name = algo.name.toLowerCase(); card.dataset.category = category;
        card.innerHTML = `<div class="algorithm-header"><div class="algorithm-name">${algo.name}<span class="help-icon-small" onclick="event.stopPropagation(); showHelpPopup('${algo.name}', '${(algo.helpContent || '<p>Info</p>').replace(/'/g, "\\'")}')">?</span></div><span class="algorithm-year">${algo.year}</span></div>
                         ${algo.formula ? `<div class="algorithm-formula">${algo.formula}</div>` : ''}
                         <div class="algorithm-description">${algo.description}</div>
                         <div class="algorithm-tags">${algo.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
                         ${algo.complexity ? `<div class="complexity">⏱️ Complexity: ${algo.complexity}</div>` : ''}
                         <button class="simulate-btn" onclick="event.stopPropagation(); document.getElementById('sim_${category}_${idx}').classList.toggle('active')">▶ Simulate</button>
                         <div class="simulation-panel" id="sim_${category}_${idx}">${buildParamPanel(algo, category, idx)}<div class="result-highlight" id="result_${category}_${idx}">Click Simulate</div></div>`;
        return card;
    }
    
    function buildParamPanel(algo, category, idx) {
        if (!algo.params) return '';
        return algo.params.map(p => {
            if (p.type === 'select') return `<div class="param-group"><label>${p.name}:</label><select id="${p.id}" class="sim-param" data-cat="${category}" data-idx="${idx}">${p.options.map(o => `<option value="${o}" ${o === p.default ? 'selected' : ''}>${o}</option>`).join('')}</select></div>`;
            if (p.type === 'text') return `<div class="param-group"><label>${p.name}:</label><input type="text" id="${p.id}" class="sim-param" data-cat="${category}" data-idx="${idx}" value="${p.default}"></div>`;
            return `<div class="param-group"><label>${p.name}:</label><input type="range" id="${p.id}" min="${p.min}" max="${p.max}" step="${p.step}" value="${p.default}" class="sim-param" data-cat="${category}" data-idx="${idx}"><span id="${p.id}_val">${p.default}${p.suffix || ''}</span></div>`;
        }).join('');
    }
    
    function attachAllSimulationListeners() {
        // Attach listeners to all range inputs and selects
        document.querySelectorAll('.sim-param').forEach(el => {
            el.removeEventListener('input', updateSimulation);
            el.removeEventListener('change', updateSimulation);
            el.addEventListener('input', updateSimulation);
            el.addEventListener('change', updateSimulation);
        });
        // Trigger initial updates
        document.querySelectorAll('.algorithm-card').forEach(card => {
            const cat = card.dataset.category;
            const idx = Array.from(card.parentElement.children).indexOf(card);
            if (cat && idx >= 0) updateSimulationForCard(cat, idx);
        });
    }
    
    function updateSimulation(e) {
        const el = e.target;
        const cat = el.dataset.cat;
        const idx = parseInt(el.dataset.idx);
        if (!isNaN(idx)) updateSimulationForCard(cat, idx);
    }
    
    function updateSimulationForCard(category, idx) {
        const algo = algorithms[category][idx];
        if (!algo) return;
        
        // Get parameter values
        let params = [];
        if (algo.params) {
            params = algo.params.map(p => {
                const el = document.getElementById(p.id);
                if (!el) return p.default;
                if (p.type === 'select') return el.value;
                if (p.type === 'text') return el.value;
                let val = parseFloat(el.value);
                if (p.multiplier) val = val / p.multiplier;
                return val;
            });
        }
        
        // Compute result
        let result;
        try {
            result = algo.simulate(...params);
        } catch(e) { result = "Error"; }
        
        // Format and display
        let resultText = '';
        let details = '';
        const name = algo.name;
        
        if (category === 'scaling') {
            if (idx === 0) { resultText = `Speedup: ${result.toFixed(2)}x`; details = `${params[0]*100}% serial, ${params[1]} cores → ${result.toFixed(2)}x`; }
            else if (idx === 1) { resultText = `Speedup: ${result.toFixed(2)}x`; details = `${params[0]*100}% serial → ${(result/params[1]*100).toFixed(1)}% efficiency`; }
            else if (idx === 2) { resultText = `Serial Fraction: ${(result*100).toFixed(1)}%`; details = `${params[0]}x on ${params[1]} cores`; }
            else { resultText = `Queue Length: ${result.toFixed(1)} jobs`; details = `${params[0]} jobs/hour, ${params[1]}h wait`; }
        }
        else if (category === 'scheduling') {
            if (idx === 0) { resultText = `Avg Wait: ${result.avgWait.toFixed(1)}s`; details = `Max: ${result.maxWait}s`; }
            else if (idx === 1) { resultText = `Avg Wait: ${result.avgWait.toFixed(1)}s`; details = `${result.improvement}% better than FIFO`; }
            else if (idx === 2) { resultText = `Avg Wait: ${result.avgWait.toFixed(1)}s`; details = `Max: ${result.maxWait}s`; }
            else if (idx === 3) { resultText = `Avg Completion: ${result.avgCompletion.toFixed(1)}ms`; details = `${params[0]} jobs, quantum ${params[1]}ms`; }
            else { resultText = `Avg Completion: ${result.avgCompletion.toFixed(1)}ms`; details = `${params[0]} jobs`; }
        }
        else if (category === 'network') {
            resultText = `Latency: ${result.latencyMs.toFixed(1)}μs`; details = `${result.totalHops} hops`;
        }
        else if (category === 'communication') {
            resultText = `Time: ${result.timeUs.toFixed(1)}μs`; details = `${result.steps} steps`;
        }
        else if (category === 'numerical') {
            if (idx === 0) { resultText = `${result.cellsPerProc.toFixed(0)} cells/proc`; details = `Comm: ${result.commTimeUs}μs`; }
            else if (idx === 1) { resultText = `${result.fftOps.toLocaleString()} ops`; details = `${result.speedup}x faster than DFT`; }
            else { resultText = `${result.operations} ops`; details = `Memory: ${result.memoryMB} MB`; }
        }
        else if (category === 'energy') {
            if (idx === 0) { resultText = `PUE: ${result.toFixed(2)}`; details = result <= 1.2 ? '✅ EuroHPC Compliant' : '⚠️ Needs Improvement'; }
            else { resultText = `${(result/1000).toFixed(1)} tons CO₂`; details = `${params[0]}kW × ${params[1]}h × ${params[2]}g/kWh`; }
        }
        else if (category === 'performance') {
            if (idx === 0) { resultText = `Efficiency: ${result.toFixed(1)}%`; details = `${params[0]}x on ${params[1]} cores`; }
            else if (idx === 1) { resultText = `Speedup: ${result.speedup}x`; details = `${result.efficiency}% efficiency`; }
            else { resultText = `Speedup: ${result.speedup}x`; details = `${result.efficiency}% efficiency`; }
        }
        
        const resultDiv = document.getElementById(`result_${category}_${idx}`);
        if (resultDiv) resultDiv.innerHTML = resultText;
        addResult(name, resultText, details);
        
        // Update value displays
        if (algo.params) {
            algo.params.forEach(p => {
                const valSpan = document.getElementById(`${p.id}_val`);
                if (valSpan) {
                    let val = document.getElementById(p.id).value;
                    if (p.multiplier) val = (val / p.multiplier * 100).toFixed(0);
                    valSpan.innerText = val + (p.suffix || '');
                }
            });
        }
    }
    
    function showHelpPopup(title, content) { if (typeof ExplanationPopup !== 'undefined') ExplanationPopup.show(title, content); else alert(title); }
    
    function filterAlgorithms() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.getElementById('categoryFilter').value;
        document.querySelectorAll('.category-section').forEach(s => { s.style.display = (cat === 'all' || s.dataset.category === cat) ? 'block' : 'none'; });
        document.querySelectorAll('.algorithm-card').forEach(c => { c.style.display = (c.dataset.name.includes(search) || c.querySelector('.algorithm-description')?.innerText.toLowerCase().includes(search)) ? 'block' : 'none'; });
    }
    
    function resetFilters() { document.getElementById('searchInput').value = ''; document.getElementById('categoryFilter').value = 'all'; filterAlgorithms(); }
    
    document.getElementById('searchInput').oninput = filterAlgorithms;
    document.getElementById('categoryFilter').onchange = filterAlgorithms;
    renderAlgorithms();
</script>
{% endblock %}
